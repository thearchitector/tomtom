[dependency-groups]
local = [
    "ruff",
    "mypy",
    "prek",
]

[tool.pytest.ini_options]
addopts = '-ra -vv'
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"

[tool.coverage.run]
branch = true

[tool.coverage.report]
exclude_also = ["if TYPE_CHECKING:"]

[tool.mypy]
python_version = "3.13"
strict = true
exclude = ["^tests/"]

[tool.basedpyright]
ignore = [ "tests" ]

[tool.ruff]
target-version = "py313"
unsafe-fixes = false
extend-include = ["*.md"]
extend-exclude = ["plans/"]

[tool.ruff.lint]
extend-select = ["B", "I", "ASYNC", "TC", "SIM", "PL", "TID", "PT", "PTH", "PERF"]
extend-ignore = ["UP037", "PLR2004", "PLR0911", "PLR0912", "TID252"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["TC", "PLR0913"]

[tool.ruff.lint.flake8-type-checking]
strict = true
quote-annotations = true
# include only if pydantic is a used dependency
runtime-evaluated-base-classes = ["pydantic.BaseModel"]
# include only if fastapi is a used dependency
runtime-evaluated-decorators = ["fastapi.APIRouter.post", "fastapi.APIRouter.put", "fastapi.APIRouter.delete", "fastapi.APIRouter.get"]

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"importlib.import_module".msg = "Do not dynamically import modules. Explicitly import them at the top of the file."

[tool.ruff.lint.isort]
split-on-trailing-comma = false

[tool.ruff.format]
docstring-code-format = true
skip-magic-trailing-comma = true
preview = true
