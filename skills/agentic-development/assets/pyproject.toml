[dependency-groups]
local = [
    "ruff",
    "mypy",
    "prek",
]

[tool.pytest.ini_options]
addopts = '-ra -vv'
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"

[tool.coverage.run]
concurrency = ["greenlet"]
branch = true

[tool.mypy]
python_version = "3.13"
strict = true
plugins = ["strawberry.ext.mypy_plugin", "pydantic.mypy"]
untyped_calls_exclude = "sqlalchemy"
exclude = ["^tests/"]

[tool.basedpyright]
ignore = [ "tests" ]

[tool.ruff]
target-version = "py313"
unsafe-fixes = false

[tool.ruff.lint]
extend-select = ["B", "I", "ASYNC", "TC", "SIM", "PL"]
extend-ignore = ["PLR2004", "PLR0911", "PLR0912"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["TC", "PLR0913"]

[tool.ruff.lint.flake8-type-checking]
strict = true
quote-annotations = true
runtime-evaluated-base-classes = ["pydantic.BaseModel", "sqlalchemy.orm.DeclarativeBase"]
runtime-evaluated-decorators = ["fastapi.APIRouter.post", "fastapi.APIRouter.put", "fastapi.APIRouter.delete", "fastapi.APIRouter.get"]

[tool.ruff.lint.isort]
split-on-trailing-comma = false

[tool.ruff.format]
docstring-code-format = true
skip-magic-trailing-comma = true
