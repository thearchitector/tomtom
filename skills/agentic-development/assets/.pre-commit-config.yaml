repos:
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.15.12
      hooks:
          - id: ruff-check
            args:
                - --fix
                - --exit-non-zero-on-fix
          - id: ruff-format
    - repo: local
      hooks:
          - id: mypy
            name: mypy
            language: system
            entry: uv run mypy
            types: [python]
            exclude: ^tests/
            require_serial: true
            pass_filenames: false
    - repo: local
      hooks:
          - id: skylos
            name: skylos
            language: system
            entry: uv run skylos . --quality --trace --coverage --pytest-fixtures --gate --llm
            types: [python]
            exclude: ^tests/
            require_serial: true
            pass_filenames: false
            verbose: true
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          - id: check-yaml
            args:
                - --allow-multiple-documents
          - id: end-of-file-fixer
          - id: trailing-whitespace
